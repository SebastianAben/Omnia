name: ${COMPOSE_PROJECT_NAME:?COMPOSE_PROJECT_NAME is required}

x-backend-environment: &backend-environment
  NODE_ENV: production
  APP_ENV: ${APP_ENV:?APP_ENV is required}
  PORT: 4000
  PUBLIC_API_URL: ${PUBLIC_API_URL:?PUBLIC_API_URL is required}
  CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
  DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
  REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
  JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
  JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
  REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-}
  LOG_LEVEL: ${LOG_LEVEL:-info}

services:
  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE is required}
    restart: unless-stopped
    environment:
      <<: *backend-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_HOST_BIND:-127.0.0.1}:${BACKEND_HOST_PORT:?BACKEND_HOST_PORT is required}:4000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:4000/api/v1/health'').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      omnia_private:
      home_proxy:
        aliases:
          - ${COMPOSE_PROJECT_NAME}-backend

  migrate:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE is required}
    restart: "no"
    environment:
      <<: *backend-environment
    depends_on:
      postgres:
        condition: service_healthy
    command: pnpm --dir apps/backend-api prisma:migrate:deploy
    profiles:
      - tools
    networks:
      - omnia_private

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-omnia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-omnia}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-omnia} -d ${POSTGRES_DB:-omnia}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - omnia_private

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - omnia_private

volumes:
  postgres_data:
  redis_data:

networks:
  omnia_private:
    driver: bridge
  home_proxy:
    external: true
