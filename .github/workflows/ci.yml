name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - dev
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Clean local env files
        run: rm -f .env apps/backend-api/.env apps/backend-api/prisma/.env

      - name: Generate Prisma client
        run: pnpm --filter @omnia/backend-api prisma:generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
