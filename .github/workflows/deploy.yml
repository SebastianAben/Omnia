name: Deploy Backend

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Validate and deploy backend
    runs-on:
      - self-hosted
      - linux
      - x64
      - omnia-home
    environment: ${{ format('omnia-{0}', github.event_name == 'pull_request' && github.base_ref || github.ref_name) }}
    concurrency:
      group: omnia-${{ github.event_name == 'pull_request' && github.base_ref || github.ref_name }}-deploy
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Clean local env files
        run: rm -f .env apps/backend-api/.env apps/backend-api/prisma/.env

      - name: Generate Prisma client
        run: pnpm --filter @omnia/backend-api prisma:generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Set image metadata
        run: |
          target_branch="${{ github.event_name == 'pull_request' && github.base_ref || github.ref_name }}"
          echo "DEPLOY_TARGET_BRANCH=${target_branch}" >> "$GITHUB_ENV"
          echo "BACKEND_IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/omnia-backend-api" >> "$GITHUB_ENV"
          echo "BACKEND_IMAGE_TAG=${target_branch}" >> "$GITHUB_ENV"
          echo "BACKEND_IMAGE_SHA_TAG=sha-${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend-api/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ env.BACKEND_IMAGE_TAG }}
            ${{ env.BACKEND_IMAGE }}:${{ env.BACKEND_IMAGE_SHA_TAG }}

      - name: Deploy to home server
        env:
          DEPLOY_TARGET_BRANCH: ${{ env.DEPLOY_TARGET_BRANCH }}
        run: scripts/deploy-home-server.sh
