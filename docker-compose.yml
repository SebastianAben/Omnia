services:
  postgres:
    image: postgres:16-alpine
    container_name: omnia-postgres
    environment:
      POSTGRES_USER: omnia
      POSTGRES_PASSWORD: omnia
      POSTGRES_DB: omnia
    ports:
      - "55433:5432"
    volumes:
      - omnia-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnia -d omnia"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: omnia-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - omnia-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  omnia-postgres-data:
  omnia-redis-data:
