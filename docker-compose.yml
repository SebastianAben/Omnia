services:
  postgres:
    image: postgres:16-alpine
    container_name: omnia-postgres
    environment:
      POSTGRES_USER: omnia
      POSTGRES_PASSWORD: omnia
      POSTGRES_DB: omnia
    ports:
      - "55433:5432"
    volumes:
      - omnia-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnia -d omnia"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: omnia-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - omnia-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate-seed:
    image: omnia-backend-api:local
    build:
      context: .
      dockerfile: apps/backend-api/Dockerfile
    command: >
      sh -c "pnpm --filter @omnia/backend-api exec prisma migrate deploy --schema prisma/schema.prisma
      && pnpm --filter @omnia/backend-api prisma:seed"
    environment:
      APP_ENV: local
      PORT: "4000"
      HOST: 0.0.0.0
      PUBLIC_API_URL: http://localhost:4000
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      DATABASE_URL: postgresql://omnia:omnia@postgres:5432/omnia
      REDIS_URL: redis://redis:6379
      JWT_SECRET: replace-with-local-development-secret
      JWT_EXPIRES_IN: 15m
      REFRESH_TOKEN_SECRET: replace-with-local-refresh-secret
      REFRESH_TOKEN_EXPIRES_IN: 30d
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gemini-2.5-flash}
      LLM_TIMEOUT_MS: ${LLM_TIMEOUT_MS:-20000}
      LLM_INSIGHT_TTL_MINUTES: ${LLM_INSIGHT_TTL_MINUTES:-15}
      LLM_MAX_INSIGHTS: ${LLM_MAX_INSIGHTS:-8}
      LLM_MAX_CONTEXT_ROWS: ${LLM_MAX_CONTEXT_ROWS:-30}
      LLM_GENERATION_COOLDOWN_MINUTES: ${LLM_GENERATION_COOLDOWN_MINUTES:-60}
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  backend-api:
    image: omnia-backend-api:local
    build:
      context: .
      dockerfile: apps/backend-api/Dockerfile
    environment:
      APP_ENV: local
      PORT: "4000"
      HOST: 0.0.0.0
      PUBLIC_API_URL: http://localhost:4000
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      DATABASE_URL: postgresql://omnia:omnia@postgres:5432/omnia
      REDIS_URL: redis://redis:6379
      JWT_SECRET: replace-with-local-development-secret
      JWT_EXPIRES_IN: 15m
      REFRESH_TOKEN_SECRET: replace-with-local-refresh-secret
      REFRESH_TOKEN_EXPIRES_IN: 30d
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gemini-2.5-flash}
      LLM_TIMEOUT_MS: ${LLM_TIMEOUT_MS:-20000}
      LLM_INSIGHT_TTL_MINUTES: ${LLM_INSIGHT_TTL_MINUTES:-15}
      LLM_MAX_INSIGHTS: ${LLM_MAX_INSIGHTS:-8}
      LLM_MAX_CONTEXT_ROWS: ${LLM_MAX_CONTEXT_ROWS:-30}
      LLM_GENERATION_COOLDOWN_MINUTES: ${LLM_GENERATION_COOLDOWN_MINUTES:-60}
      LOG_LEVEL: info
    ports:
      - "4000:4000"
    depends_on:
      redis:
        condition: service_healthy
      migrate-seed:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:4000/api/v1/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  desktop-web:
    image: omnia-desktop-web:local
    build:
      context: .
      dockerfile: apps/desktop-app/Dockerfile.web
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:4000/api/v1
    ports:
      - "3000:80"
    depends_on:
      backend-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  omnia-postgres-data:
  omnia-redis-data:
